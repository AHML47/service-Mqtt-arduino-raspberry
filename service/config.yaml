# ── Hydroponic Bridge Configuration ──────────────────────────
# Copy to config.yaml (project root) and edit for your setup.
# Set the CONNECTION_STRING environment variable to define the
# MQTT prefix: hydroponic/{CONNECTION_STRING}

serial:
  port: auto               # auto-detect Arduino serial port
  baudrate: 9600
  timeout: 1.0
  response_timeout: 2.0

mqtt:
  host: 165.232.139.240
  port: 1885
  username: backend
  password: backend
  client_id: hydroponic-bridge
  publish_sensor_data: false
  # topic_prefix is set automatically from CONNECTION_STRING env var.
  # Override here only if not using the env var.
  topic_prefix: hydroponic/default
  qos: 1
  keepalive: 6000

photo:
  output_dir: photos
  resolution: [1280, 720]
  raw_resolution: [4608, 2592]
  warmup_s: 2.0
  autofocus: true

streaming:
  enabled: false   # set to true to enable MJPEG stream at http://<pi-ip>:<port>
  port: 8000

logging:
  level: DEBUG

# ── Cycle System ──────────────────────────────────────────────
# Each group runs its commands every `interval` seconds.
# run_on_start: true  → also execute immediately when the service starts.
#
# Command types:
#   serial  → send command to Arduino; set publish_response: true to push
#             the OK: result to the sensorData MQTT topic.
#   photo   → capture and publish a photo (uses the camera module).
#   mqtt    → publish a raw payload to any topic; use {prefix} as a
#             placeholder for the configured topic_prefix.
#
# delay_after: N  → wait N seconds after this command before the next one.

cycles:
  - name: tri_hourly_cultivation
    interval: 10800         # 3 hours
    run_on_start: true      # also runs immediately when the service starts
    commands:
      - type: serial
        command: dc1:ON
        publish_response: false
        delay_after: 2
      - type: photo
        delay_after: 2
      - type: serial
        command: step1:MOVE:340085
        publish_response: false
        delay_after: 60
      - type: photo
        delay_after: 2
      - type: serial
        command: step1:MOVE:-340085
        publish_response: false
        delay_after: 4
      - type: serial
        command: dc1:OFF
        publish_response: false

# ── Operators (first-class actuators) ─────────────────────────
# Define operators that map MQTT-level names to Arduino devices and actions.
operators:
  - name: motor1
    arduino_device: dc1
    actions:
      on:
        command: "{device}:ON"
        duration_param: duration
        followup: "{device}:OFF"
      off:
        command: "{device}:OFF"

  - name: SN_eb8c133df2
    arduino_device: step1
    actions:
      move:
        command: "{device}:MOVE:{steps}"
