# ── Hydroponic Bridge Configuration ──────────────────────────
# Real greenhouse: hydro-uj0a7s / zone-ef8f9716

serial:
  port: "/dev/ttyACM0"     # Arduino serial port
  baudrate: 9600
  timeout: 1.0
  response_timeout: 2.0

mqtt:
  host: 165.232.139.240
  port: 1883
  username: backend
  password: backend
  client_id: hydroponic-bridge-uj0a7s
  topic_prefix: "hydroponic/hydro-uj0a7s/zone-ef8f9716"
  publish_sensor_data: true
  qos: 1
  keepalive: 6000

photo:
  output_dir: photos
  resolution: [1280, 720]
  raw_resolution: [4608, 2592]
  warmup_s: 2.0
  autofocus: true
  name: "SN_6a0a06f04e"     # camera serial number from DB

streaming:
  enabled: true
  port: 8000

logging:
  level: DEBUG

# ── Sensors ───────────────────────────────────────────────────
# DB: temperature (SN_18d79c7303) → temperature + humidity
# DB: humid Sensor 1 (SN_0093d96dfb) → humidity
sensors:
  - name: "SN_5b154c9738"
    arduino_device: "temperature"
    command: "temperature:TEMP"
    field_index: 0
  - name: "SN_26067e549e"
    arduino_device: "humidity"
    command: "humidity:HUM"
    field_index: 0
  - name: "SN_8b3572a842"
    arduino_device: "ultra1"
    command: "ultra1:READ"
    field_index: 0
  
# ── Operators (actionneurs) ───────────────────────────────────
# Operator names MUST match the serial numbers in the database
# because the backend publishes to {prefix}/{serialNumber}/cmd
operators:
  - name: "SN_LED_001"
    arduino_device: "testLed"
    actions:
      "on":
        command: "testLed:ON"
        duration_param: duration
        followup: "testLed:OFF"
      "off":
        command: "testLed:OFF"
  - name: "SN_PUMP_001"
    arduino_device: "dc1"
    actions:
      "on":
        command: "dc1:ON"
        duration_param: duration
        followup: "dc1:OFF"
      "off":
        command: "dc1:OFF"
      "speed":
        command: "dc1:SPEED:{speed}"

  - name: "SN_serre_reel_zone_ef8f9716_moteur_de_camera_001"
    arduino_device: "step1"
    actions:
      "on":
        command: "step1:MOVE:200000:150"
      "off":
        command: "step1:STOP"
      "move":
        command: "step1:MOVE:{steps}"
      "move_speed":
        command: "step1:MOVE:{steps}:{delay}"
      "cw":
        command: "step1:CW"
      "cw_speed":
        command: "step1:CW:{delay}"
      "ccw":
        command: "step1:CCW"
      "stop":
        command: "step1:STOP"
      "pos":
        command: "step1:POS"
      "status":
        command: "step1:STATUS"
      "zero":
        command: "step1:ZERO"

# ── Cameras ───────────────────────────────────────────────────
cameras:
  - name: "SN_6a0a06f04e"

# ── Cycles ────────────────────────────────────────────────────
cycles:
  - name: "sensor_polling"
    interval: 30
    run_on_start: true
    commands:
      - type: sensor

  - name: "auto_irrigation"
    interval: 10800 # run every 3heure s (300s)
    run_on_start: true
    commands:
      - type: serial
        command: "dc1:ON"
        delay_after: 30   # run pump for 30 seconds
      - type: serial
        command: "dc1:OFF"

  - name: "auto_lighting"
    interval: 10800    # run every 10 minutes (600s)
    run_on_start: true
    commands:
      - type: serial
        command: "testLed:ON"
        delay_after: 120     # keep light on for 2 minutes (120s)
      - type: serial
        command: "testLed:OFF"
