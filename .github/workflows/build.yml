name: Build, Test, and Deploy Raspberry Pi OTA Binary

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Optional release name or version (example: v1.2.0)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  APP_ENTRYPOINT: "service/run_service.py"
  DIST_NAME: "ota-service"

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests/ directory found; skipping pytest."
          fi

  build-and-deploy:
    name: Build ARM64 executable and deploy to DigitalOcean Spaces
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create ARM64 build container definition
        run: |
          cat > Dockerfile.ota <<'DOCKERFILE'
          FROM --platform=linux/arm64 python:3.11-slim-bookworm

          ENV PYTHONDONTWRITEBYTECODE=1 \
              PYTHONUNBUFFERED=1 \
              PIP_NO_CACHE_DIR=1

          WORKDIR /workspace

          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential \
              gcc \
              git \
              libcap-dev \
              patchelf \
              && rm -rf /var/lib/apt/lists/*

          COPY requirements.txt /workspace/requirements.txt

          RUN python -m pip install --upgrade pip \
              && python -m pip install -r requirements.txt \
              && python -m pip install pyinstaller pytest

          COPY . /workspace
          DOCKERFILE

      - name: Build ARM64 builder image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.ota \
            -t ota-builder:latest \
            --load \
            .

      - name: Build executable and run checks inside ARM64 container
        run: |
          mkdir -p dist
          docker run --rm \
            --platform linux/arm64 \
            -e APP_ENTRYPOINT="${APP_ENTRYPOINT}" \
            -e DIST_NAME="${DIST_NAME}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e RELEASE_NAME="${{ inputs.release_name }}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            ota-builder:latest \
            bash -lc '
              set -euo pipefail

              python -m compileall -q .

              if [ -d tests ]; then
                pytest -q
              fi

              if [ ! -f "${APP_ENTRYPOINT}" ]; then
                echo "Could not find entrypoint: ${APP_ENTRYPOINT}"
                exit 1
              fi

              rm -rf build dist
              pyinstaller --noconfirm --onefile --name "${DIST_NAME}" "${APP_ENTRYPOINT}"

              "dist/${DIST_NAME}" --help >/dev/null
              sha256sum "dist/${DIST_NAME}" > "dist/${DIST_NAME}.sha256"

              VERSION="${RELEASE_NAME}"
              if [ -z "${VERSION}" ]; then
                VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
              fi

              cat > "dist/release.json" <<JSON
              {
                "name": "${DIST_NAME}",
                "version": "${VERSION}",
                "git_sha": "${GITHUB_SHA}",
                "ref_name": "${GITHUB_REF_NAME}",
                "platform": "linux/arm64",
                "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
              JSON
            '

      - name: Show build output
        run: ls -lah dist

      - name: Upload GitHub Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_NAME }}-arm64
          path: |
            dist/${{ env.DIST_NAME }}
            dist/${{ env.DIST_NAME }}.sha256
            dist/release.json

      - name: Install AWS CLI
        run: python -m pip install awscli

      - name: Upload artifacts to DigitalOcean Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
          DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION }}
          DO_SPACES_BUCKET: ${{ vars.DO_SPACES_BUCKET }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${DO_SPACES_REGION}.digitaloceanspaces.com"
          PREFIX="releases/${GITHUB_REF_NAME}/${GITHUB_SHA}"

          aws s3 cp "dist/${DIST_NAME}" \
            "s3://${DO_SPACES_BUCKET}/${PREFIX}/${DIST_NAME}" \
            --endpoint-url "${ENDPOINT}"

          aws s3 cp "dist/${DIST_NAME}.sha256" \
            "s3://${DO_SPACES_BUCKET}/${PREFIX}/${DIST_NAME}.sha256" \
            --endpoint-url "${ENDPOINT}"

          aws s3 cp "dist/release.json" \
            "s3://${DO_SPACES_BUCKET}/${PREFIX}/release.json" \
            --endpoint-url "${ENDPOINT}"

          echo "Uploaded release prefix: ${PREFIX}"
