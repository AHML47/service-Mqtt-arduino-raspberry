name: Build Raspberry Pi Service

on:
  push:
    branches:
      - main

jobs:
  build-arm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t service-builder \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            .

      - name: Create container
        run: |
          docker create --name extract service-builder

      - name: Extract binary
        run: |
          docker cp extract:/app/build/__main__.dist/service.bin ./service.bin

      - name: Cleanup container
        run: |
          docker rm extract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-bin
          path: service.bin